<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-skilled landing page</title>
  </head>
  <body>
    <header class="header u-container">
      <img
        class="site-logo"
        src="/public/img/logo-dark.svg"
        alt="E-skilled
      logo"
      />
      <a class="btn btn--dark" href="#">Get Started</a>
    </header>

    <main class="home-page">
      <section class="hero">
        <div class="hero__content">
          <h1 class="hero__title">Maximize skill, minimize budget</h1>
          <p class="hero__description">
            Our modern courses across a range of in-demand skills will give you
            the knowledge you need to live the life you want.
          </p>
          <a class="btn btn--radiant" href="#">Get Started</a>
        </div>
        <img
          class="hero__image hero__image--desktop"
          src="/public/img/image-hero-desktop.png"
          alt="Hero image"
        />
        <img
          class="hero__image hero__image--tablet"
          src="/public/img/image-hero-tablet.png"
          alt="Hero image"
        />
        <img
          class="hero__image hero__image--mobile"
          src="/public/img/image-hero-mobile.png"
          alt="Hero image"
        />
      </section>
    </main>
  </body>
</html>
